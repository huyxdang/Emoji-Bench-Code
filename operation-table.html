<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operation Table</title>
  <style>
    :root {
      color-scheme: light;
      background: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .operation-grid {
      display: grid;
      grid-template-columns: repeat(4, 210px);
      grid-template-rows: repeat(4, 116px);
      align-items: center;
      justify-items: center;
    }

    .label {
      width: 210px;
      height: 116px;
      display: grid;
      place-items: center;
      border: 2px solid #cfcfcf;
      background: #ffffff;
      font-size: 54px;
      line-height: 1;
      font-weight: 400;
    }

    .operator {
      font-weight: 600;
    }

    .result-table {
      grid-column: 2 / 5;
      grid-row: 2 / 5;
      display: grid;
      grid-template-columns: repeat(3, 210px);
      grid-template-rows: repeat(3, 116px);
      border: 5px solid #222222;
      background: #ffffff;
    }

    .result-cell {
      width: 210px;
      height: 116px;
      display: grid;
      place-items: center;
      border: 2px solid #444444;
      background: #ffffff;
      font-size: 54px;
      line-height: 1;
    }

    .highlight-input {
      background: #eaf3ff;
    }

    .highlight-result {
      background: #ffe8a3;
      box-shadow: inset 0 0 0 4px #f2b705;
    }


  </style>
</head>
<body>
  <div class="operation-grid" aria-label="Emoji addition operation table">
    <div class="label operator" style="grid-column: 1; grid-row: 1;">⊕</div>
    <div class="label" style="grid-column: 2; grid-row: 1;">🪈</div>
    <div class="label highlight-input" style="grid-column: 3; grid-row: 1;">🪵</div>
    <div class="label" style="grid-column: 4; grid-row: 1;">🥟</div>

    <div class="label" style="grid-column: 1; grid-row: 2;">🪈</div>
    <div class="label highlight-input" style="grid-column: 1; grid-row: 3;">🪵</div>
    <div class="label" style="grid-column: 1; grid-row: 4;">🥟</div>

    <div class="result-table" aria-hidden="true">
      <div class="result-cell">🥟</div>
      <div class="result-cell highlight-input">🪵</div>
      <div class="result-cell">🥟</div>
      <div class="result-cell highlight-input">🪈</div>
      <div class="result-cell highlight-result">🪵</div>
      <div class="result-cell">🥟</div>
      <div class="result-cell">🪈</div>
      <div class="result-cell">🪈</div>
      <div class="result-cell">🪵</div>
    </div>
  </div>
</body>
</html>
